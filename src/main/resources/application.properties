# ================================================
# SARVAM PROFESSIONAL EDUCATION - BCA FINAL YEAR PROJECT
# Application Properties
# ================================================

spring.application.name=Sarvam Professional Education

# ====================== SERVER ======================
server.port=8080
server.servlet.context-path=/

# ====================== DATABASE (MySQL) ======================
spring.datasource.url=jdbc:mysql://localhost:3306/sarvam_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ====================== JPA & HIBERNATE ======================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ====================== THYMELEAF ======================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false
spring.thymeleaf.check-template-location=true

# ====================== STATIC RESOURCES ======================
spring.web.resources.static-locations=classpath:/static/

# ====================== SECURITY ======================
spring.security.user.name=admin
spring.security.user.password=admin123

# ====================== LOGGING ======================
logging.level.root=INFO
logging.level.com.sarvam=DEBUG
logging.file.name=logs/sarvam.log

# ====================== UPLOAD SETTINGS (Future use ke liye) ======================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ====================== DEMO DATA ======================
spring.sql.init.mode=never

# ====================== PROJECT INFO ======================
project.version=1.0
project.developer=Sudhir (BCA Final Year)
project.year=2026
