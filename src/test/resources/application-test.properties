# Test profile — uses in-memory H2 in PostgreSQL mode so tests do not touch a real DB.
spring.datasource.url=jdbc:h2:mem:sarvam_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# data.sql has Postgres-specific helpers (pg_get_serial_sequence) — skip in tests
spring.sql.init.mode=never
